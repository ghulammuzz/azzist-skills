# azzist project config — SAFE TO COMMIT (placeholders only, no secrets).
# Secrets live in azzist.local.yaml (gitignored). Run azzist-init to generate both.

project:
  name: my-landing          # used to namespace docker network/containers: azzist_<name>_*
  stack: nuxt               # v1 supported: nuxt | (later) go | gofiber | python

domain: landing.example.com # public domain to attach via Cloudflare

deploy:
  proxy: auto               # auto | nginx | traefik
                            #   auto: detect Traefik container -> use labels; else nginx vhost; else install nginx
  port: auto                # auto: pick a free host port on the server | or a fixed number e.g. 8080
  server: prod              # references a server entry under servers: in azzist.local.yaml

database: none              # none | postgres   (postgres runs as an isolated container in the project network)
cache: none                # none | redis      (redis runs as an isolated container in the project network)
